<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HLV AI · Calorie AI</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="toast.css" />
<link rel="stylesheet" href="both.css" />
<link rel="stylesheet" href="chat.css">
<link rel="icon" href="logo.png" type="image/png">

</head>
<body>
  <div id="toast-container"></div>

  <aside class="side-nav">
    <div class="nav-item active" id="nav-home"><i class="fa-solid fa-comment"></i><span>AI</span></div>
    <div class="nav-item" id="nav-diet"><i class="fa-solid fa-fire-flame-curved"></i><span>DIET</span></div>
    <div class="nav-item" id="nav-plan"><i class="fa-solid fa-calendar-days"></i><span>PLAN</span></div>
    <div class="nav-item" id="nav-profile"><i class="fa-solid fa-user"></i><span>PROFILE</span></div>
    <div class="nav-item" onclick="location.href='guide.html'"><i class="fa-solid fa-circle-question"></i><span>GUIDE</span></div>
  </aside>

  <div class="main-wrapper">
    <header class="header">
      <a href="index.html" class="logo"><i class="fa-solid fa-leaf"></i> Calorie AI</a>
      <div id="auth-zone" class="header-tools">
        <div class="user-profile-nav" onclick="handleLogout()" title="Nhấn để đăng xuất">
          <span class="user-name"><i class="fa-solid fa-circle-user"></i> <strong>Đăng xuất</strong></span>
          <div class="btn-logout-icon"><i class="fa-solid fa-right-from-bracket"></i></div>
        </div>
      </div>
    </header>

    <main class="content">
      <section class="chat-section">
        <div class="chat-window" id="chat-window">
          <div class="card">Chào bạn! Hãy gửi tin nhắn hoặc ảnh món ăn, tôi sẽ phân tích giúp bạn.</div>
        </div>

        <div class="input-wrapper">
          <div class="input-tools" onclick="document.getElementById('file-upload').click()" title="Tải ảnh món ăn">
            <i class="fa-solid fa-circle-plus"></i>
            <input type="file" id="file-upload" accept=".jpg,.jpeg" style="display:none" onchange="handleFileSelect()" />
          </div>
          <input id="user-input" type="text" placeholder="Hỏi tôi liên quan về dinh dưỡng..." class="chat-input" />
          <button class="send-btn" onclick="sendMessage()" title="Gửi"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
      </section>

      <aside class="info-sidebar">
        <div class="card card-food">
          <div class="food-img-container">
            <img id="display-food-img" src="https://i.pinimg.com/736x/9d/51/c3/9d51c32cccb77dcf89cc2fb11aa20a17.jpg" alt="Food" />
          </div>

          <div class="calories-box">
            <div class="title"><i class="fa-solid fa-utensils"></i> Tổng năng lượng</div>
            <div class="value"><span id="val-calories">0</span> <span style="font-size:14px;font-weight:500;color:var(--text-sub)">kcal</span></div>
          </div>

          <div id="val-desc" class="desc-text">Thông tin sẽ cập nhật sau khi phân tích.</div>

          <div class="stats-grid-mini">
            <div class="stat-item-mini"><span>Protein</span><b id="val-protein">--</b></div>
            <div class="stat-item-mini"><span>Chất béo</span><b id="val-fat">--</b></div>
            <div class="stat-item-mini"><span>Carbs</span><b id="val-carbs">--</b></div>
            <div class="stat-item-mini"><span>Chất xơ</span><b id="val-fiber">--</b></div>
            <div class="stat-item-mini"><span>Đường</span><b id="val-sugar">--</b></div>
            <div class="stat-item-mini"><span>Natri</span><b id="val-sodium">--</b></div>
          </div>
        </div>
      </aside>
    </main>
  </div>

  <template id="meal-selection-template">
    <div class="meal-interactive-card">
      <div class="meal-modal-title">✨ Xác nhận bữa ăn của bạn</div>
      <div class="meal-modal-section">
        <div class="meal-label">Chọn buổi ăn</div>
        <div class="meal-choice-grid">
          <button type="button" class="meal-choice-btn" data-meal-time="Sáng">Sáng</button>
          <button type="button" class="meal-choice-btn" data-meal-time="Trưa">Trưa</button>
          <button type="button" class="meal-choice-btn" data-meal-time="Tối">Tối</button>
          <button type="button" class="meal-choice-btn" data-meal-time="Bữa phụ">Bữa phụ</button>
        </div>
      </div>
      <div class="meal-modal-section">
        <div class="meal-label">Thời điểm</div>
        <div class="meal-choice-grid">
          <button type="button" class="meal-choice-btn day-btn active" data-day-mode="today">Hôm nay</button>
          <button type="button" class="meal-choice-btn day-btn" data-day-mode="other">Ngày khác</button>
        </div>
      </div>
      <div class="other-day-wrap hidden">
        <input id="meal-date-input" class="other-day-input" type="date" />
      </div>
      <div class="meal-modal-actions">
        <button type="button" class="meal-modal-btn primary btn-confirm-meal">Xác nhận</button>
        <button type="button" class="meal-modal-btn secondary btn-cancel-meal">Hủy</button>
      </div>
    </div>
  </template>

  <script src="toast.js"></script>
  <script src="chat.js"></script>
</body>
</html>
