<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - Calorie AI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="toast.css">
    <link rel="icon" href="logo.png" type="image/png">
    <link rel="stylesheet" href="signup.css">
</head>
<body>
<div id="toast-container"></div>

<div class="auth-container">
    <div class="auth-header">
        <a href="index.html" class="logo" style="margin-bottom: 10px; font-size: 1.5rem;text-decoration: none;">
            <i class="fa-solid fa-leaf" style="color: #2ecc71;"></i> <span style="font-weight: 700; color: #333;">Calorie AI</span>
        </a>
        <h2>Tạo tài khoản mới</h2>
        <p style="color: #666;">Bắt đầu hành trình dinh dưỡng của bạn</p>
    </div>

    <form class="auth-form" id="signupForm">
        <div class="input-group">
            <label>Tên đăng nhập</label>
            <input type="text" id="username" placeholder="Ví dụ: nva123" required>
        </div>
        <div class="input-group">
            <label>Mật khẩu</label>
            <input type="password" id="password" placeholder="••••••••" required>
        </div>
        
        <div class="input-group">
            <label>Năm sinh</label>
            <input type="number" id="birthYear" placeholder="1995" required>
        </div>

        <div class="input-group">
            <label>Cân nặng (kg)</label>
            <input type="number" id="weight" placeholder="65" required>
        </div>
        <div class="input-group">
            <label>Chiều cao (cm)</label>
            <input type="number" id="height" placeholder="170" required>
        </div>

        <button type="submit" class="btn-auth">Đăng ký ngay</button>
    </form>

    <div class="auth-footer">
        Đã có tài khoản? <a href="signin.html">Đăng nhập</a>
    </div>
</div>
<script src="toast.js"></script>
<script src="signup.js"></script>
</body>
</html>
