<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tìm Quán Ăn Google</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f5f5f5;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.box{
    background:white;
    padding:40px;
    border-radius:20px;
    width:90%;
    max-width:600px;
    box-shadow:0 15px 35px rgba(0,0,0,0.1);
    text-align:center;
}

h1{
    margin-bottom:25px;
    color:#ff5722;
}

input{
    width:100%;
    padding:15px;
    border:1px solid #ddd;
    border-radius:12px;
    font-size:16px;
    margin-bottom:15px;
}

button{
    width:100%;
    padding:15px;
    border:none;
    background:#ff5722;
    color:white;
    font-size:16px;
    border-radius:12px;
    cursor:pointer;
}

button:hover{
    background:#e64a19;
}

p{
    margin-top:15px;
    color:#666;
    font-size:14px;
}
</style>
</head>
<body>

<div class="box">
    <h1>🍜 Tìm Quán Ăn Gần Bạn</h1>

    <input type="text" id="food" placeholder="Nhập món ăn... vd: phở, sushi">

    <button onclick="searchGoogle()">Tìm bằng Google</button>

    <p>Trang sẽ mở Google Maps / Google Search</p>
</div>

<script>
function searchGoogle(){
    let food = document.getElementById("food").value.trim();

    if(food === ""){
        alert("Nhập món ăn trước!");
        return;
    }

    if(navigator.geolocation){
        navigator.geolocation.getCurrentPosition(function(pos){

            let lat = pos.coords.latitude;
            let lng = pos.coords.longitude;

            let query = encodeURIComponent(food + " gần đây");

            let url =
            "https://www.google.com/maps/search/" +
            query +
            "/@" + lat + "," + lng + ",15z";

            window.open(url, "_blank");

        }, function(){
            let url = "https://www.google.com/search?q=" + encodeURIComponent(food + " gần đây");
            window.open(url, "_blank");
        });
    }
}
</script>

</body>
</html>
