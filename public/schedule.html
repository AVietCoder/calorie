    <script src="toast.js"></script>
    <script>
   async function sendMessage() {
    const input = document.getElementById('user-input');
    const history = document.getElementById('chat-history');
    const typingIndicator = document.getElementById('typing-indicator');
    const message = input.value.trim();
    if (!message) return;
    const userHtml = `<div class="user-msg">${message}</div>`;
    history.insertAdjacentHTML('beforeend', userHtml);
    input.value = '';
    scrollToBottom();

    typingIndicator.style.display = 'block';
    scrollToBottom();

    try {
        const token = localStorage.getItem('calorie_ai_token'); 
        
        const response = await fetch('/api/coach-dynamic', {
            method: 'POST',
            headers: { 
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify({ message: message }) 
        });

        const data = await response.json();

        if (data.success) {
            const aiHtml = `<div class="ai-msg">${data.reply}</div>`;
            history.insertAdjacentHTML('beforeend', aiHtml);
            
            if (data.newPlan) {
                updateRemainingTimetable(data.newPlan);
            }
        } else {
            const errorHtml = `<div class="ai-msg" style="color: #ef4444;">Rất tiếc, mình gặp lỗi khi xử lý yêu cầu. Bạn thử lại nhé!</div>`;
            history.insertAdjacentHTML('beforeend', errorHtml);
        }
    } catch (error) {
        console.error("Lỗi Chat AI:", error);
    } finally {
        typingIndicator.style.display = 'none';
        scrollToBottom();
    }
}

function scrollToBottom() {
    const history = document.getElementById('chat-history');
    history.scrollTo({
        top: history.scrollHeight,
        behavior: 'smooth'
    });
}
function updateRemainingTimetable(newPlan) {
    if (!newPlan) return;

    const mealIdMap = {
        "Sáng": "morning",
        "Trưa": "lunch",
        "Tối": "evening",
        "Phụ": "snack"
    };

    newPlan.forEach(item => {
        const cellId = `d${item.day}-${mealIdMap[item.meal]}`; 
        const cell = document.getElementById(cellId);
        
        if (cell) {
            cell.style.border = "1.5px solid var(--primary-green)";
            cell.style.background = "linear-gradient(to bottom, #ffffff, #f0fdf4)";
            cell.innerHTML = `
                <div style="font-weight: 700; color: var(--dark-green); font-size: 0.82rem;">${item.food}</div>
                <div style="font-size: 0.65rem; color: var(--text-sub);">${item.amount}</div>
                <div style="margin-top: 4px; font-weight: 800; color: var(--primary-green); font-size: 0.75rem;">${item.calories} kcal</div>
            `;
        }
    });
}
function updateProgress(startWeight, currentWeight, targetWeight) {
    const displayPercent = document.getElementById('display-percent');
    const displayStart = document.getElementById('display-start');
    const displayRemain = document.getElementById('display-remain');

    if (!displayPercent || !startWeight) return;

    const totalChangeNeeded = Math.abs(startWeight - targetWeight);
    const achieved = Math.abs(startWeight - currentWeight);
    const percent = totalChangeNeeded === 0 ? 100 : Math.min(100, Math.round((achieved / totalChangeNeeded) * 100));
    
    displayPercent.innerText = `${percent}%`;
    displayStart.innerText = `Bắt đầu: ${startWeight}kg`;
    
    const remain = (currentWeight - targetWeight).toFixed(1);
    displayRemain.innerText = remain > 0 ? `Còn lại: ${remain}kg` : `Đã đạt mục tiêu!`;
}

async function loadAIMenu() 
{
    const token = localStorage.getItem('calorie_ai_token');
    if (!token) 
    {
        window.location.href = "signin.html";
        return;
    }

    const responseArea = document.getElementById('ai-response-text'); 
    const roadmapContainer = document.querySelector('.content');

    const loader = document.createElement('div');
    loader.className = 'loading-overlay';
    loader.id = 'main-loader';
    loader.innerHTML = '<div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>';
    roadmapContainer.appendChild(loader);
    try {
        const res = await fetch("/api/chat-history", {
            method: "GET",
            headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await res.json();
        if (res.ok == false)
        {
            showToast("Vui lòng đăng nhập!", "info");
            setTimeout(() => {
                window.location.href = "signin.html";
            }, 1369); 
            return;
        }
    } catch (e) {
        console.error(e)
        showToast("Vui lòng đăng nhập!", "info");
        setTimeout(() => {
            window.location.href = "signin.html";
        }, 1369);   
    }
    try {
        const statusRes = await fetch('/api/status', 
        {
            method: 'GET',
            headers: { 'Authorization': `Bearer ${token}` }
        });
        const statusData = await statusRes.json();

        if (!statusData.is_setup_completed) 
        {
            window.location.href = 'setup.html';
            return; 
        }

        const res = await fetch('/api/coach-dynamic', {
            method: 'POST',
            headers: { 
                'Authorization': `Bearer ${token}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ isQueryOnly: true }) 
        });
        
        const result = await res.json();
        
        if (result.success) {
            responseArea.innerHTML = `
                <div class="ai-reply-text" style="line-height:1.6; color:var(--text-main); padding: 15px; background: #f0fdf4; border-radius: 12px; border-left: 4px solid var(--primary-green); margin-bottom: 20px;">
                    <i class="fa-solid fa-quote-left" style="opacity:0.3"></i> ${result.reply}
                </div>`;

            if (result.newPlan && result.newPlan.length > 0) {
                if (typeof updateRemainingTimetable === 'function') {
                    updateRemainingTimetable(result.newPlan);
                }
                showToast("Đã cập nhật thực đơn mới từ AI!", "success");
            }
        } else {
            showToast(result.message || "Không thể lấy thực đơn", "warning");
        }

    } catch (err) {
        console.error("Lỗi kết nối HLV AI:", err);
        showToast("Lỗi kết nối HLV AI", "error");
        responseArea.innerHTML = '<p style="color: #e74c3c; font-size: 0.9rem; text-align: center;">Không thể kết nối với HLV AI. Vui lòng thử lại sau.</p>';
    } finally {
        const loaderObj = document.getElementById('main-loader');
        if (loaderObj) {
            setTimeout(() => loaderObj.remove(), 400);
        }
    }
}

function showLongAnalysisToast(message, duration) {
    const oldToast = document.querySelector('.long-analysis-toast');
    if (oldToast) oldToast.remove();

    const toast = document.createElement('div');
    toast.className = 'toast long-analysis-toast';
    toast.innerHTML = `
        <div class="toast-content">
            <i class="fa-solid fa-microchip fa-spin"></i>
            <div class="toast-text">
                <span class="toast-title">Đang phân tích sâu...</span>
                <p>${message}</p>
                <div class="toast-progress-bar"><div class="progress-fill"></div></div>
            </div>
        </div>
    `;
    
    document.getElementById('toast-container').appendChild(toast);
    
    const fill = toast.querySelector('.progress-fill');
    setTimeout(() => {
        fill.style.transition = `width ${duration}ms linear`;
        fill.style.width = '100%';
    }, 100);

    setTimeout(() => {
        toast.style.opacity = '0';
        setTimeout(() => toast.remove(), 500);
    }, duration);
}

function handleLogout() {
    localStorage.removeItem('calorie_ai_token');
    showToast("Đang đăng xuất...", "info");
    setTimeout(() => window.location.href = "signin.html", 1000);
}
window.onload = loadAIMenu;
document.getElementById('nav-home').onclick = () => window.location.href = 'chat.html';
document.getElementById('nav-diet').onclick = () => window.location.href = 'diet-details.html';
document.getElementById('nav-profile').onclick = () => window.location.href = 'setup.html';

</script>
