<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Calorie AI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="toast.css">
    <link rel="icon" href="logo.png" type="image/png">
    <link rel="stylesheet" href="signin.css">
</head>
<body>
<div id="toast-container"></div>

<div class="auth-container">
    <div class="auth-header">
        <a href="index.html" class="logo" style="margin-bottom: 10px; font-size: 1.5rem;text-decoration: none;">
            <i class="fa-solid fa-leaf" style="color: #2ecc71;"></i> <span style="font-weight: 700; color: #333;">Calorie AI</span>
        </a>
        <h2>Chào mừng trở lại</h2>
        <p style="color: #666;">Tiếp tục theo dõi sức khỏe của bạn</p>
    </div>

    <form class="auth-form" id="loginForm">
        <div class="input-group">
            <label>Tên đăng nhập</label>
            <input type="text" id="username" placeholder="Nhập username" required>
        </div>
        <div class="input-group">
            <label>Mật khẩu</label>
            <input type="password" id="password" placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn-auth">Đăng nhập</button>
    </form>

    <div class="auth-footer">
        Chưa có tài khoản? <a href="signup.html">Đăng ký ngay</a>
    </div>
</div>
<script src="toast.js"></script>
<script src="signin.js"></script>
</body>
</html>
