<script>
    async function loadDietData() {
    const token = localStorage.getItem('calorie_ai_token');
    
    try {
        const res = await fetch('/api/diet-info', {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        const result = await res.json();

        if (result.success) {
            const d = result.data;
            
            document.getElementById('display-calories').innerHTML = `${d.calories.toLocaleString()} <span class="target-unit">kcal</span>`;
            document.getElementById('display-weight').innerText = `${d.profile.weight} kg`;
            document.getElementById('display-target').innerText = `${d.profile.target_weight} kg`;
            document.getElementById('display-deadline').innerText = d.profile.deadline;
            
            
            document.getElementById('p-val').innerText = `${d.macros.protein}g`;
            document.getElementById('c-val').innerText = `${d.macros.carbs}g`;
            document.getElementById('f-val').innerText = `${d.macros.fat}g`;

            
            document.querySelector('.main-card div:last-child').innerHTML = 
                `<span><i class="fa-solid fa-bolt"></i> BMR: ${d.bmr}</span> 
                 <span><i class="fa-solid fa-fire"></i> TDEE: ${d.tdee}</span>`;
        }
    } catch (err) {
        console.error("Lỗi tải dữ liệu diet");
    }
}

window.onload = loadDietData;
