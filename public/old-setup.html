                    <label>Deadline (Ngày đạt)</label>
                    <input type="date" name="deadline">

                    <label>Tốc độ mong muốn</label>
                    <select name="speed">

                        <option value="normal">Vừa phải (0.7kg/tuần)</option>
                        <option value="fast">Nhanh (1kg/tuần)</option>

                </div>
            </div>
